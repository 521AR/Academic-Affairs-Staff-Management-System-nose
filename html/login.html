<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>核心御防锁匙舱 - 管理员控制台认证</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #02040a !important;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🛡️ 高级安全防御雷达标尺网格画布 */
        #login-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        /* 登录视口包裹层 */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* 极高防御级别全息毛玻璃盒舱 */
        .login-box {
            background: rgba(10, 15, 30, 0.65);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px; /* 直角轻偏，强化严谨工整风 */
            padding: 45px 35px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65), 0 0 35px rgba(59, 130, 246, 0.08);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .login-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #3b82f6, #eab308, transparent); opacity: 0.9;
        }
        .login-box:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 35px 75px rgba(0, 0, 0, 0.7), 0 0 45px rgba(59, 130, 246, 0.2);
        }

        /* 顶部标题区 */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-header h1 {
            font-size: 1.9rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 0%, #93c5fd 60%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .login-header .subtitle {
            font-size: 0.9rem;
            color: #475569;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 输入框卡槽 */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .input-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-with-icon i {
            position: absolute;
            left: 14px;
            color: #334155;
            font-size: 1.1rem;
            transition: color 0.3s;
            display: flex; align-items: center;
        }
        .form-control {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 0 15px 0 45px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            background: rgba(59, 130, 246, 0.03);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }
        .form-control:focus + i,
        .form-control:focus ~ i,
        .input-with-icon:focus-within i {
            color: #3b82f6 !important;
        }
        /* 兼容原有内嵌SVG */
        .input-with-icon svg { transition: stroke 0.3s; }
        .input-with-icon:focus-within svg circle,
        .input-with-icon:focus-within svg path,
        .input-with-icon:focus-within svg rect {
            stroke: #3b82f6 !important;
        }

        /* 选项栏 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.88rem;
            margin-bottom: 30px;
        }
        .checkbox-container {
            display: flex; align-items: center; gap: 8px; color: #64748b; cursor: pointer; user-select: none;
        }
        .checkbox-container input { cursor: pointer; accent-color: #3b82f6; }
        .forgot-link {
            color: #475569; text-decoration: none; transition: color 0.3s;
        }
        .forgot-link:hover { color: #3b82f6; }

        /* 错误弹窗 */
        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.25);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 22px;
            text-align: center;
        }

        /* 高密安全仓按键 */
        .login-btn {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.4s ease;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        /* 底部链接区 */
        .register-section {
            text-align: center;
            margin-top: 25px;
            font-size: 0.88rem;
        }
        .register-text { color: #475569; }
        .register-link {
            color: #3b82f6; text-decoration: none; font-weight: 600; margin-left: 4px; transition: color 0.3s;
        }
        .register-link:hover { color: #ffffff; text-shadow: 0 0 10px #3b82f6; }

        /* Vue 动画梯度 */
        .error-fade-enter-active, .error-fade-leave-active { transition: all 0.4s ease; }
        .error-fade-enter, .error-fade-leave-to { opacity: 0; transform: translateY(-6px); }
    </style>
</head>
<body>
<canvas id="login-canvas"></canvas>

<div id="app" class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <h1>欢迎admin登录</h1>
            <p class="subtitle">SECURE BACKEND AUTHENTICATION</p>
        </div>

        <form id="loginForm" @submit.prevent="toLogin" novalidate>
            <div class="form-group">
                <label for="username">用户名或邮箱</label>
                <div class="input-with-icon">
                    <i class="icon-user">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="#334155" stroke-width="2"/>
                            <path d="M20 21C20 16.5817 16.4183 13 12 13C7.58172 13 4 16.5817 4 21" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </i>
                    <input
                            type="text"
                            id="username"
                            name="username"
                            v-model.trim="formData.username"
                            placeholder="请输入用户名或邮箱……"
                            autocomplete="off"
                            class="form-control"
                    />
                </div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-with-icon">
                    <i class="icon-lock">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <rect x="4" y="10" width="16" height="10" rx="2" stroke="#334155" stroke-width="2"/>
                            <path d="M9 10V7C9 4.79086 10.7909 3 13 3H15C17.2091 3 19 4.79086 19 7V10" stroke="#334155" stroke-width="2"/>
                        </svg>
                    </i>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            v-model="formData.password"
                            placeholder="••••••••"
                            class="form-control"
                    />
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" v-model="formData.remberme"/>
                    记住我
                </label>
                <a href="#" class="forgot-link" @click.prevent="showForgotAlert">忘记密码？</a>
            </div>

            <transition name="error-fade">
                <p id="error" class="error-message" v-if="errorMsg" v-html="errorMsg"></p>
            </transition>

            <button type="submit" class="login-btn">
                <span class="btn-text">登 录</span>
            </button>

            <div class="register-section">
                <p class="register-text">还没有账号？<a href="register.html" class="register-link">去注册</a></p>
            </div>
        </form>
    </div>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>
    // 100% 保留原有后端业务函数与本地信息插入
    new Vue({
        el: '#app',
        data() {
            return {
                host: 'http://localhost:8080',
                formData: {
                    username: '',
                    password: '',
                    remberme: false
                },
                errorMsg: '',
                timer: null
            }
        },
        methods: {
            toLogin() {
                if (!this.formData.username) {
                    this.showError('用户名不能为空！');
                    return;
                }
                if (!this.formData.password) {
                    this.showError('请填写密码！');
                    return;
                }
                if (this.formData.password.length < 6) {
                    this.showError('密码不能少于6位！');
                    return;
                }

                axios.post(`${this.host}/admin/login`, this.formData)
                    .then(res => {
                        if (res.data && res.data.success) {
                            localStorage.setItem('jwt_token', res.data.token);
                            localStorage.setItem('username', res.data.username);
                            localStorage.setItem('role', res.data.role);
                            window.location.href = "index.html";
                        } else {
                            this.showError(res.data.message || "用户名或密码错误！");
                        }
                    })
                    .catch(error => {
                        console.error("登录请求出错:", error);
                        this.showError("登录请求失败，请检查网络或后端服务！");
                    });
            },
            showError(msg) {
                this.errorMsg = msg;
                this.clearErrorTimer();
                this.timer = setTimeout(() => {
                    this.errorMsg = '';
                }, 3000);
            },
            clearErrorTimer() {
                if (this.timer) {
                    clearTimeout(this.timer);
                    this.timer = null;
                }
            },
            showForgotAlert() {
                alert('请联系系统管理员重置密码');
            }
        },
        beforeDestroy() {
            this.clearErrorTimer();
        }
    });

    // ==========================================================
    // 🛡️ 渲染管理员侧专属：高级御防深海蓝正交格栅与升腾光子
    // ==========================================================
    const canvas = document.getElementById('login-canvas'), ctx = canvas.getContext('2d');
    let points = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    class ShieldNode {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height + canvas.height;
            this.speed = Math.random() * 0.8 + 0.3; this.size = Math.random() * 2 + 1;
            this.alpha = Math.random() * 0.5 + 0.1;
        }
        draw() {
            ctx.fillStyle = `rgba(59, 130, 246, ${this.alpha})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            this.y -= this.speed;
            if (this.y < -20) { this.y = canvas.height + 20; this.x = Math.random() * canvas.width; }
        }
    }
    for(let i=0; i<45; i++) points.push(new ShieldNode());

    function drawSystem() {
        ctx.fillStyle = 'rgba(2, 4, 10, 0.16)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 渲染正交安全标尺格栅线 (Admin特有)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.008)'; ctx.lineWidth = 1;
        for(let g = 0; g < canvas.width; g += 80) { ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, canvas.height); ctx.stroke(); }
        for(let g = 0; g < canvas.height; g += 80) { ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(canvas.width, g); ctx.stroke(); }

        points.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(drawSystem);
    }
    drawSystem();
</script>
</body>
</html>
