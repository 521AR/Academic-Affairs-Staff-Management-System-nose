<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人中心</title>
    <link rel="stylesheet" href="../css/profile.css" />
</head>
<body>
<div id="app">
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <div id="avatar" class="avatar">U</div>
                <h1 class="title">个人中心</h1>
            </div>
            <div class="nav">
                <a href="javascript:void(0)" @click="goindex">首页</a>
                <a href="javascript:void(0)" @click="goHomePage1">登录</a>
                <a href="javascript:void(0)" @click="goRegister1">注册</a>
                <a href="javascript:void(0)" @click="logout1">退出</a>
            </div>
        </div>

        <div class="grid">
            <section class="card">
                <h2>基础信息</h2>
                <table class="user-table" id="userInfoTable">
                    <thead>
                    <tr>
                        <th>字段</th>
                        <th>值</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>用户ID</td>
                        <td id="userId">-</td>
                    </tr>
                    <tr>
                        <td>昵称</td>
                        <td id="nickname">-</td>
                    </tr>
                    <tr>
                        <td>用户名</td>
                        <td id="username">-</td>
                    </tr>
                    <tr>
                        <td>邮箱</td>
                        <td id="email">-</td>
                    </tr>
                    <tr>
                        <td>手机号</td>
                        <td id="phone">-</td>
                    </tr>
                    <tr>
                        <td>密码</td>
                        <td id="password">-</td>
                    </tr>
                    <tr>
                        <td>角色</td>
                        <td id="role"><span class="badge">user</span></td>
                    </tr>
                    </tbody>
                </table>
                <div class="spacer"></div>
                <div class="row">
                    <button class="btn-outline" id="refresh">刷新</button>
                    <button class="btn" id="edit" style="display:none;">编辑</button>
                </div>
            </section>

            <aside class="card">
                <h2>账户状态</h2>
                <div class="stats">
                    <div class="stat">
                        <div class="muted">安全等级</div>
                        <div class="num ok" id="securityLevel">良好</div>
                    </div>
                    <div class="stat">
                        <div class="muted">最近登录</div>
                        <div class="num" id="lastLogin">-</div>
                    </div>
                    <div class="stat">
                        <div class="muted">消息未读</div>
                        <div class="num warn" id="unread">0</div>
                    </div>
                </div>
            </aside>
        </div>

        <div class="spacer"></div>

        <section class="card">
            <h2>最近活动</h2>
            <table class="table" id="activity">
                <thead>
                <tr>
                    <th>时间</th>
                    <th>事件</th>
                    <th>状态</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <div id="emptyActivity" class="empty" style="display:none;">暂无活动</div>
        </section>
    </div>
</div>


<!-- 编辑对话框 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>修改个人信息</h3>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" id="editNickname" class="form-input" />
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" id="editEmail" class="form-input" />
            </div>
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" id="editPhone" class="form-input" />
            </div>
            <div class="form-group">
                <label class="form-label">新密码（留空不修改）</label>
                <input type="password" id="editPassword" class="form-input" />
            </div>
        </div>
        <div class="modal-footer">
            <button id="cancelEdit" class="modal-button modal-button-secondary">取消</button>
            <button id="saveEdit" class="modal-button modal-button-primary">保存</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
    const app = new Vue({
        el: '#app',
        data: {
            user: null,
            isEditable: false,
            host: 'http://127.0.0.1:8080'
        },
        methods: {
            async fetchUser() {
                try {
                    // 获取当前登录用户的token
                    const token = localStorage.getItem('jwt_token');
                    if (!token) {
                        alert('请先登录');
                        window.location.href = 'UserLogin.html';
                        return;
                    }

                    // 根据token获取用户信息
                    const response = await axios.get(`${this.host}/users/searchUser/${localStorage.getItem('username')}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    this.user = response.data;
                    this.isEditable = this.user.username !== 'admin';

                    // 更新UI
                    this.updateUserInfo();
                    this.populateStats();
                    this.populateActivity();
                } catch (error) {
                    console.error('获取用户信息失败:', error);
                    alert('获取用户信息失败，请稍后重试');
                }
            },
            updateUserInfo() {
                if (!this.user) return;

                document.getElementById('userId').textContent = this.user.userId || '-';
                document.getElementById('nickname').textContent = this.user.nickname || '-';
                document.getElementById('username').textContent = this.user.username || '-';
                document.getElementById('email').textContent = this.user.email || '-';
                document.getElementById('phone').textContent = this.user.phone || '-';
                document.getElementById('password').textContent = this.user.password ? '••••••' : '-';
                document.getElementById('role').innerHTML = `<span class="badge">${this.user.role || 'user'}</span>`;

                // 设置头像
                const initial = (this.user.nickname || this.user.username || 'U').slice(0,1).toUpperCase();
                document.getElementById('avatar').textContent = initial;

                // 控制编辑按钮显示
                document.getElementById('edit').style.display = this.isEditable ? 'inline-block' : 'none';
            },
            populateStats() {
                const last = localStorage.getItem('demo_last_login') || new Date().toLocaleString();
                document.getElementById('lastLogin').textContent = last;
                document.getElementById('unread').textContent = String(Math.floor(Math.random() * 3));
                document.getElementById('securityLevel').textContent = ['一般','良好','较高'][Math.floor(Math.random() * 3)];
            },
            populateActivity() {
                const tbody = document.querySelector('#activity tbody');
                tbody.innerHTML = '';
                const items = [
                    { time: new Date().toLocaleString(), event: '登录系统', status: '成功', level: 'ok' },
                    { time: new Date(Date.now()-3600e3).toLocaleString(), event: '修改个人信息', status: '成功', level: 'ok' },
                    { time: new Date(Date.now()-86400e3).toLocaleString(),event: '重置密码', status: '失败', level: 'danger' }
                ];
                if (!items.length) {
                    document.getElementById('emptyActivity').style.display = 'block';
                    return;
                }
                document.getElementById('emptyActivity').style.display = 'none';
                for (const it of items) {
                    const tr = document.createElement('tr');
                    const td1 = document.createElement('td'); td1.textContent = it.time;
                    const td2 = document.createElement('td'); td2.textContent = it.event;
                    const td3 = document.createElement('td'); td3.innerHTML = `<span class="${it.level}">${it.status}</span>`;
                    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
                    tbody.appendChild(tr);
                }
            },
            openEditModal() {
                if (!this.user) return;

                // 填充表单data
                document.getElementById('editNickname').value = this.user.nickname || '';
                document.getElementById('editEmail').value = this.user.email || '';
                document.getElementById('editPhone').value = this.user.phone || '';
                document.getElementById('editPassword').value = '';

                // 显示模态框
                document.getElementById('editModal').style.display = 'block';
            },
            closeEditModal() {
                document.getElementById('editModal').style.display = 'none';
            },
            async saveUserInfo() {
                if (!this.user) return;

                // 获取表单data
                const nickname = document.getElementById('editNickname').value.trim();
                const email = document.getElementById('editEmail').value.trim();
                const phone = document.getElementById('editPhone').value.trim();
                const password = document.getElementById('editPassword').value.trim();

                // 验输入
                if (!nickname) {
                    alert('昵称不能为空');
                    return;
                }

                if (email && !this.isValidEmail(email)) {
                    alert('请输入有效的邮箱地址');
                    return;
                }

                if (phone && !this.isValidPhone(phone)) {
                    alert('请输入有效的手机号码');
                    return;
                }

                try {
                    const token = localStorage.getItem('jwt_token');

                    // 构建完整的更新对象
                    const updateData = {
                        userId: this.user.userId,
                        nickname: nickname,
                        email: email || this.user.email,
                        phone: phone || this.user.phone
                    };

                    // 如果提供了新密码，则包含在请求中
                    if (password) {
                        updateData.password = password;
                    }

                    console.log('发送的更新data:', updateData);

                    const response = await axios.put(`${this.host}/users/updateUser/${this.user.userId}`, updateData, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    console.log('服务器响应:', response);

                    // 改进的成功判断逻辑，支持多种返回格式
                    let success = false;
                    let message = '修改成功！';

                    // 检查不同的成功返回格式
                    if (response.data && typeof response.data === 'object') {
                        // JSON格式返回
                        success = response.data.success === true ||
                            response.data.success === 'true' ||
                            response.data.code === 200 ||
                            response.data.result === 'success';
                        message = response.data.message || message;
                    } else if (typeof response.data === 'number') {
                        // 数字返回（如1表示成功）
                        success = response.data === 1 || response.data === '1';
                        message = '修改成功！';
                    } else if (typeof response.data === 'string') {
                        // 字符串返回
                        success = response.data.toLowerCase().includes('success') ||
                            response.data.toLowerCase().includes('成功');
                        message = response.data;
                    }

                    if (success) {
                        // 更新本地用户data
                        this.user.nickname = nickname;
                        this.user.email = email || this.user.email;
                        this.user.phone = phone || this.user.phone;

                        // 如果修改了密码，更新本地存储
                        if (password) {
                            this.user.password = password;
                        }

                        // 更新UI
                        this.updateUserInfo();
                        this.closeEditModal();
                        alert(message);
                    } else {
                        // 显示具体的错误信息
                        const errorMessage = response.data && response.data.message ?
                            response.data.message :
                            response.data && response.data.error ?
                                response.data.error :
                                '修改失败，请检查网络连接';
                        alert(errorMessage);
                    }
                } catch (error) {
                    console.error('update用户信息失败:', error);
                    let errorMsg = 'update失败，请稍后重试';
                    if (error.response) {
                        errorMsg = error.response.data ?
                            error.response.data.message :
                            `服务器错误: ${error.response.status}`;
                    } else if (error.request) {
                        errorMsg = '网络连接失败，请检查网络';
                    } else {
                        errorMsg = `未知错误:${error.message}`;
                    }
                    alert(errorMsg);
                }
            },
            isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            },
            isValidPhone(phone) {
                const re = /^1[3-9]\d{9}$/;
                return re.test(phone);
            },
            goHomePage1: function() {
                window.location.href = 'homePage.html';
            },
            goRegister1:function () {
                window.location.href = 'register.html';
            },
            logout1:function () {
                // 清除本地存储的token和其他用户信息
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('username');
                localStorage.removeItem('role');
                localStorage.removeItem('nickname');

                // 跳转到homePage.html
                window.location.href = 'homePage.html';
            },
            goindex:function () {
                window.location.href = 'Userindex.html';
            },
        },
        mounted() {
            // 页面加载时获取用户信息
            this.fetchUser();

            // 绑定事件监听器 - 移除重复的logout事件绑定
            /*document.getElementById('logout').addEventListener('click', function (e) {
                e.preventDefault();
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('username');
                localStorage.removeItem('role');
                localStorage.removeItem('nickname');
                window.location.href = 'homePage.html';
            });*/

            document.getElementById('refresh').addEventListener('click', () => {
                this.fetchUser();
            });

            document.getElementById('edit').addEventListener('click', () => {
                this.openEditModal();
            });

            // 模态框事件
            document.getElementById('cancelEdit').addEventListener('click', () => {
                this.closeEditModal();
            });

            document.getElementById('saveEdit').addEventListener('click', () => {
                this.saveUserInfo();
            });

            // 点击模态框外部关闭
            window.addEventListener('click', (event) => {
                const modal = document.getElementById('editModal');
                if (event.target === modal) {
                    this.closeEditModal();
                }
            });
        }
    });
</script>
</body>
</html>
